<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Advisor Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ── Login ─────────────────────────────── */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; flex-direction: column; gap: 16px;
  }
  #login-screen h1 { font-size: 24px; margin-bottom: 8px; }
  #login-screen input {
    padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 16px; width: 280px;
  }
  #login-screen button {
    padding: 12px 32px; border-radius: 8px; border: none;
    background: var(--accent); color: white; font-size: 16px; cursor: pointer;
  }
  #login-screen button:hover { opacity: 0.9; }
  #login-error { color: var(--red); font-size: 14px; display: none; }

  /* ── Dashboard ─────────────────────────── */
  #dashboard { display: none; max-width: 1200px; margin: 0 auto; padding: 24px; }

  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 22px; display: flex; align-items: center; gap: 10px; }
  header button {
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer; font-size: 13px;
  }
  header button:hover { color: var(--text); border-color: var(--text); }

  /* ── Stats ──────────────────────────────── */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; text-align: center;
  }
  .stat-card .number { font-size: 32px; font-weight: 700; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
  .stat-card.urgent .number { color: var(--red); }
  .stat-card.open .number { color: var(--yellow); }
  .stat-card.closed .number { color: var(--green); }
  .stat-card.reminders .number { color: var(--blue); }
  .stat-card.team .number { color: var(--accent); }

  /* ── Tabs ───────────────────────────────── */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    border-bottom: 1px solid var(--border); padding-bottom: 0;
  }
  .tab {
    padding: 10px 20px; cursor: pointer; border: none; background: none;
    color: var(--muted); font-size: 14px; font-weight: 500;
    border-bottom: 2px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Filters ────────────────────────────── */
  .filters {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filters select {
    padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px;
  }

  /* ── Table ──────────────────────────────── */
  .panel { display: none; }
  .panel.active { display: block; }

  table {
    width: 100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  th {
    text-align: left; padding: 12px 16px; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
    background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(255,255,255,0.02); }

  /* ── Badges ─────────────────────────────── */
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
  }
  .badge.open { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge.in_progress { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge.pending { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge.closed { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.low { background: rgba(113,113,122,0.15); color: var(--muted); }
  .badge.medium { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge.high { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge.urgent { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge.sent { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.pending-r { background: rgba(234,179,8,0.15); color: var(--yellow); }

  /* ── Activity ───────────────────────────── */
  .activity-list { display: flex; flex-direction: column; gap: 8px; }
  .activity-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 16px; display: flex; align-items: center; gap: 12px;
  }
  .activity-icon {
    width: 36px; height: 36px; border-radius: 50%; display: flex;
    align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  }
  .activity-icon.ticket_created { background: rgba(34,197,94,0.15); }
  .activity-icon.ticket_updated { background: rgba(59,130,246,0.15); }
  .activity-icon.ticket_closed { background: rgba(113,113,122,0.15); }
  .activity-icon.reminder_created { background: rgba(234,179,8,0.15); }
  .activity-icon.reminder_sent { background: rgba(99,102,241,0.15); }
  .activity-icon.report_sent { background: rgba(249,115,22,0.15); }
  .activity-text { flex: 1; }
  .activity-text strong { color: var(--text); }
  .activity-text span { color: var(--muted); font-size: 13px; }
  .activity-time { color: var(--muted); font-size: 12px; white-space: nowrap; }

  /* ── Team ────────────────────────────────── */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .team-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px;
  }
  .team-card h3 { font-size: 16px; margin-bottom: 8px; }
  .team-card .team-stats { display: flex; gap: 12px; }
  .team-card .team-stat { font-size: 13px; color: var(--muted); }
  .team-card .team-stat strong { color: var(--text); }

  .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* ── Roadmap ─────────────────────────────── */
  .roadmap-board { display: flex; gap: 16px; overflow-x: auto; }
  .roadmap-col { flex: 1; min-width: 280px; }
  .roadmap-col-header {
    font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 10px 16px; border-radius: 8px 8px 0 0; margin-bottom: 8px;
  }
  .roadmap-col-header.planned { background: rgba(99,102,241,0.15); color: var(--accent); }
  .roadmap-col-header.in_progress { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .roadmap-col-header.done { background: rgba(34,197,94,0.15); color: var(--green); }

  .roadmap-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 8px; cursor: default;
  }
  .roadmap-card h4 { font-size: 14px; margin-bottom: 6px; }
  .roadmap-card p { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
  .roadmap-card .rm-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .roadmap-card .rm-attachments { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .roadmap-card .rm-thumb {
    width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); cursor: pointer;
  }
  .roadmap-card .rm-file {
    display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px;
    border-radius: 6px; background: rgba(255,255,255,0.05); font-size: 12px; color: var(--muted);
    text-decoration: none;
  }
  .roadmap-card .rm-file:hover { color: var(--text); }
  .roadmap-card .rm-actions { display: flex; gap: 6px; margin-top: 8px; }
  .roadmap-card .rm-actions button, .roadmap-card .rm-actions select {
    padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 11px; cursor: pointer;
  }
  .roadmap-card .rm-actions button:hover { color: var(--text); border-color: var(--text); }

  .rm-add-form {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; margin-bottom: 16px;
  }
  .rm-add-form input, .rm-add-form textarea, .rm-add-form select {
    width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 10px; font-family: inherit;
  }
  .rm-add-form textarea { min-height: 70px; resize: vertical; }
  .rm-add-form .rm-row { display: flex; gap: 10px; }
  .rm-add-form .rm-row > * { flex: 1; }
  .rm-add-form button[type="submit"] {
    padding: 10px 24px; border-radius: 6px; border: none;
    background: var(--accent); color: white; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  .rm-add-form button[type="submit"]:hover { opacity: 0.9; }
  .rm-add-form .file-drop {
    border: 2px dashed var(--border); border-radius: 8px; padding: 16px; text-align: center;
    color: var(--muted); font-size: 13px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s;
  }
  .rm-add-form .file-drop:hover, .rm-add-form .file-drop.dragover { border-color: var(--accent); color: var(--accent); }
  .rm-add-form .file-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .rm-add-form .file-preview-item {
    position: relative; width: 70px; height: 70px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border);
  }
  .rm-add-form .file-preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .rm-add-form .file-preview-item .fp-name {
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
    font-size: 9px; padding: 2px 4px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rm-add-form .file-preview-item .fp-remove {
    position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: white;
    border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; line-height: 1;
  }

  /* ── Lightbox ──────────────────────────── */
  .lightbox {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; cursor: pointer;
  }
  .lightbox.active { display: flex; }
  .lightbox img, .lightbox video { max-width: 90%; max-height: 90%; border-radius: 8px; }

  /* ── Refresh ─────────────────────────────── */
  .refresh-bar {
    display: flex; justify-content: flex-end; margin-bottom: 8px; gap: 8px; align-items: center;
  }
  .refresh-bar span { font-size: 12px; color: var(--muted); }
  .refresh-bar button {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 12px;
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <h1>Task Advisor</h1>
  <p style="color: var(--muted); margin-bottom: 8px;">Enter password to access the dashboard</p>
  <input type="password" id="login-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()">Login</button>
  <div id="login-error">Wrong password</div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <header>
    <h1>Task Advisor Dashboard</h1>
    <button onclick="doLogout()">Logout</button>
  </header>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="tickets">Tickets</button>
    <button class="tab" data-tab="reminders">Reminders</button>
    <button class="tab" data-tab="activity">Activity</button>
    <button class="tab" data-tab="team">Team</button>
    <button class="tab" data-tab="sales">💰 Sales</button>
    <button class="tab" data-tab="pipeline">🎯 Pipeline</button>
    <button class="tab" data-tab="meetings">📅 Meetings</button>
    <button class="tab" data-tab="fulfillment">🏗️ Fulfillment</button>
    <button class="tab" data-tab="decisions">📝 Decisions</button>
    <button class="tab" data-tab="roadmap">🗺️ Roadmap</button>
  </div>

  <!-- Tickets -->
  <div class="panel active" id="panel-tickets">
    <div class="filters">
      <select id="filter-status" onchange="loadTickets()">
        <option value="all">All Status</option>
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="pending">Pending</option>
        <option value="closed">Closed</option>
      </select>
      <select id="filter-priority" onchange="loadTickets()">
        <option value="all">All Priority</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <select id="filter-assignee" onchange="loadTickets()">
        <option value="all">All Assignees</option>
        <option value="Hasan">Hasan</option>
        <option value="Hussain">Hussain</option>
        <option value="Abbas">Abbas</option>
        <option value="Anas">Anas</option>
      </select>
      <select id="filter-overdue" onchange="loadTickets()">
        <option value="0">All Dates</option>
        <option value="1">🔴 Overdue Only</option>
      </select>
    </div>
    <div class="refresh-bar">
      <span id="tickets-count"></span>
      <button onclick="loadTickets()">Refresh</button>
    </div>
    <div id="tickets-table"></div>
  </div>

  <!-- Reminders -->
  <div class="panel" id="panel-reminders">
    <div class="refresh-bar">
      <button onclick="loadReminders()">Refresh</button>
    </div>
    <div id="reminders-table"></div>
  </div>

  <!-- Activity -->
  <div class="panel" id="panel-activity">
    <div class="refresh-bar">
      <button onclick="loadActivity()">Refresh</button>
    </div>
    <div id="activity-feed"></div>
  </div>

  <!-- Team -->
  <div class="panel" id="panel-team">
    <div class="refresh-bar">
      <button onclick="loadTeam()">Refresh</button>
    </div>
    <div id="team-grid"></div>
  </div>

  <!-- Sales -->
  <div class="panel" id="panel-sales">
    <div class="refresh-bar"><button onclick="loadSales()">Refresh</button></div>
    <div id="sales-content"></div>
  </div>

  <!-- Pipeline (Kanban) -->
  <div class="panel" id="panel-pipeline">
    <div class="filters">
      <select id="pipeline-owner" onchange="loadPipeline()">
        <option value="all">All Owners</option>
        <option value="Hasan">Hasan</option><option value="Hussain">Hussain</option>
        <option value="Abbas">Abbas</option><option value="Anas">Anas</option>
      </select>
      <button onclick="loadPipeline()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px">Refresh</button>
    </div>
    <div id="pipeline-summary"></div>
    <div id="pipeline-board" style="display:flex;gap:12px;overflow-x:auto;padding-top:12px"></div>
  </div>

  <!-- Meetings -->
  <div class="panel" id="panel-meetings">
    <div class="filters">
      <select id="meetings-outcome" onchange="loadMeetings()">
        <option value="all">All Outcomes</option>
        <option value="pending">⏳ Pending</option>
        <option value="closed">✅ Closed</option>
        <option value="follow_up">📞 Follow-up</option>
        <option value="lost">❌ Lost</option>
      </select>
      <select id="meetings-owner" onchange="loadMeetings()">
        <option value="all">All Owners</option>
        <option value="Hasan">Hasan</option><option value="Hussain">Hussain</option>
        <option value="Abbas">Abbas</option><option value="Anas">Anas</option>
      </select>
      <button onclick="loadMeetings()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px">Refresh</button>
    </div>
    <div id="meetings-table"></div>
  </div>

  <!-- Fulfillment -->
  <div class="panel" id="panel-fulfillment">
    <div class="filters">
      <select id="fulfillment-owner" onchange="loadFulfillment()">
        <option value="all">All Owners</option>
        <option value="Hasan">Hasan</option><option value="Hussain">Hussain</option>
        <option value="Abbas">Abbas</option><option value="Anas">Anas</option>
      </select>
      <button onclick="loadFulfillment()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:12px">Refresh</button>
    </div>
    <div id="fulfillment-grid"></div>
  </div>

  <!-- Roadmap -->
  <div class="panel" id="panel-roadmap">
    <div class="rm-add-form" id="roadmap-form">
      <h3 style="margin-bottom:12px;font-size:16px">Add to Roadmap</h3>
      <input type="text" id="rm-title" placeholder="Feature / item title" required>
      <textarea id="rm-desc" placeholder="Description (optional)"></textarea>
      <div class="rm-row">
        <select id="rm-priority"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select>
        <select id="rm-category"><option value="">Category...</option><option value="Feature">Feature</option><option value="Bug Fix">Bug Fix</option><option value="Improvement">Improvement</option><option value="Design">Design</option><option value="Infrastructure">Infrastructure</option></select>
        <input type="date" id="rm-target" style="color-scheme:dark" title="Target date (optional)">
      </div>
      <div class="file-drop" id="rm-file-drop" onclick="document.getElementById('rm-files').click()">
        📎 Drop files here or click to upload<br><span style="font-size:11px">(screenshots, videos, designs — up to 50MB)</span>
      </div>
      <input type="file" id="rm-files" multiple accept="image/*,video/*,.pdf,.fig,.sketch" style="display:none" onchange="handleFileSelect(this.files)">
      <div class="file-preview" id="rm-file-preview"></div>
      <button type="submit" onclick="submitRoadmapItem()">Add Item</button>
    </div>

    <div class="filters" style="margin-bottom:12px">
      <select id="rm-filter-status" onchange="loadRoadmap()">
        <option value="all">All Status</option>
        <option value="planned">Planned</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
      </select>
      <button onclick="loadRoadmap()" style="padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px">Refresh</button>
    </div>

    <div class="roadmap-board" id="roadmap-board"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" style="display:none">
    <video id="lightbox-video" src="" controls style="display:none"></video>
  </div>

  <!-- Decisions -->
  <div class="panel" id="panel-decisions">
    <div class="refresh-bar">
      <input id="decision-search" placeholder="Search decisions..." style="padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;width:220px" oninput="loadDecisions()">
      <button onclick="loadDecisions()">Refresh</button>
    </div>
    <div id="decisions-list"></div>
  </div>
</div>

<script>
const API = '';

// ── Auth ────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('login-pw').value;
  const res = await fetch(API + '/api/login', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw }),
  });
  if (res.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

async function doLogout() {
  await fetch(API + '/api/logout', { method: 'POST' });
  location.reload();
}

async function checkAuth() {
  const res = await fetch(API + '/api/stats');
  if (res.ok) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadAll();
  }
}

// ── Load All ────────────────────────────
function loadAll() { loadStats(); loadTickets(); loadReminders(); loadActivity(); loadTeam(); loadSales(); loadDecisions(); loadRoadmap(); loadPipeline(); loadMeetings(); loadFulfillment(); }

// ── Stats ───────────────────────────────
async function loadStats() {
  const res = await fetch(API + '/api/stats');
  const s = await res.json();
  document.getElementById('stats').innerHTML = `
    <div class="stat-card open"><div class="number">${s.openTickets}</div><div class="label">Open Tickets</div></div>
    <div class="stat-card closed"><div class="number">${s.closedTickets}</div><div class="label">Closed</div></div>
    <div class="stat-card urgent"><div class="number">${s.urgentTickets}</div><div class="label">Urgent</div></div>
    <div class="stat-card urgent" style="cursor:pointer" onclick="filterOverdue()"><div class="number">${s.overdueTickets}</div><div class="label">🔴 Overdue</div></div>
    <div class="stat-card reminders"><div class="number">${s.pendingReminders}</div><div class="label">Pending Reminders</div></div>
    <div class="stat-card team"><div class="number">${s.teamMembers}</div><div class="label">Team Members</div></div>
  `;
}

// ── Tickets ─────────────────────────────
function filterOverdue() {
  document.querySelector('.tab[data-tab="tickets"]').click();

async function loadTickets() {
  const status   = document.getElementById('filter-status').value;
  const priority = document.getElementById('filter-priority').value;
  const assignee = document.getElementById('filter-assignee').value;
  const overdue  = document.getElementById('filter-overdue').value;
  const res = await fetch(API + `/api/tickets?status=${status}&priority=${priority}&assignee=${assignee}&overdue=${overdue}`);
  const tickets = await res.json();
  document.getElementById('tickets-count').textContent = `${tickets.length} tickets`;

  if (!tickets.length) {
    document.getElementById('tickets-table').innerHTML = '<div class="empty">No tickets found</div>';
    return;
  }

  document.getElementById('tickets-table').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Title</th><th>Status</th><th>Priority</th>
        <th>Assigned To</th><th>Due Date</th><th>Age</th>
      </tr></thead>
      <tbody>${tickets.map(t => {
        const nowTs = Math.floor(Date.now() / 1000);
        const isOverdue = t.due_date && t.due_date < nowTs && t.status !== 'closed';
        const dueCell = t.due_date
          ? (isOverdue
              ? `<span style="color:var(--red);font-weight:600">🔴 ${fmtDate(t.due_date)}</span>`
              : `<span style="color:var(--muted)">📅 ${fmtDate(t.due_date)}</span>`)
          : '<span style="color:var(--border)">—</span>';
        return `<tr style="${isOverdue ? 'background:rgba(239,68,68,0.05)' : ''}">
          <td>${t.id}</td>
          <td>${esc(t.title)}${t.project ? ` <span style="font-size:11px;color:var(--muted)">[${esc(t.project)}]</span>` : ''}</td>
          <td><span class="badge ${t.status}">${t.status.replace('_', ' ')}</span></td>
          <td><span class="badge ${t.priority}">${t.priority}</span></td>
          <td>${esc(t.assigned_to || '—')}</td>
          <td>${dueCell}</td>
          <td>${ago(t.created_at)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

// ── Helpers ─────────────────────────────
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function ago(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function fmtDate(ts) {
  return new Date(ts * 1000).toLocaleString('en-US', {
    timeZone: 'Asia/Bahrain', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit',
  });
}

async function loadSales() {
  const res = await fetch(API + '/api/sales');
  const { current, history } = await res.json();
  if (!current) {
    document.getElementById('sales-content').innerHTML = '<div class="empty">No sales target set for this week.<br><br>Ask the bot: <strong>"set sales target 5000"</strong></div>';
    return;
  }
  const pct     = Math.min(100, Math.round((current.current_amount / current.target_amount) * 100));
  const gap     = (current.target_amount - current.current_amount).toFixed(0);
  const barColor = pct >= 100 ? 'var(--green)' : pct >= 75 ? 'var(--yellow)' : 'var(--accent)';
  const numColor = pct >= 100 ? 'var(--green)' : pct >= 75 ? 'var(--yellow)' : 'var(--orange)';
  const weekEnd = new Date(current.week_end * 1000).toLocaleDateString('en-US', { timeZone: 'Asia/Bahrain', weekday: 'long', month: 'short', day: 'numeric' });
  const motivation = pct >= 100
    ? '🏆 Target smashed! Incredible work!'
    : pct >= 75
    ? `🔥 Almost there! Just ${gap} ${current.currency} to go!`
    : pct >= 50
    ? `⚡ Halfway there! ${gap} ${current.currency} left — let's go!`
    : `💪 ${gap} ${current.currency} to close — every deal counts!`;

  let html = `
    <div class="stat-card" style="margin-bottom:16px;text-align:left;padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div>
          <div style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">This Week's Pipeline</div>
          <div style="font-size:36px;font-weight:700;color:var(--accent)">${current.current_amount} <span style="font-size:18px;color:var(--muted)">${current.currency}</span></div>
          <div style="color:var(--muted);font-size:14px;margin-top:2px">of <strong style="color:var(--text)">${current.target_amount} ${current.currency}</strong> target</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:48px;font-weight:800;color:${numColor}">${pct}%</div>
          <div style="font-size:12px;color:var(--muted)">ends ${weekEnd}</div>
        </div>
      </div>
      <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden;margin-bottom:12px">
        <div style="background:${barColor};height:100%;width:${pct}%;transition:width 0.5s;border-radius:6px"></div>
      </div>
      <div style="font-size:14px;color:var(--text)">${motivation}</div>
    </div>`;

  if (history && history.length > 1) {
    html += `<table><thead><tr><th>Week of</th><th>Target</th><th>Achieved</th><th>%</th></tr></thead><tbody>`;
    for (const h of history.slice(1)) {
      const hp = Math.round((h.current_amount / h.target_amount) * 100);
      const cls = hp >= 100 ? 'closed' : hp >= 75 ? 'open' : 'urgent';
      const wk  = new Date(h.week_start * 1000).toLocaleDateString('en-US', { timeZone: 'Asia/Bahrain', month: 'short', day: 'numeric' });
      html += `<tr><td>${wk}</td><td>${h.target_amount} ${h.currency}</td><td>${h.current_amount} ${h.currency}</td><td><span class="badge ${cls}">${hp}%</span></td></tr>`;
    }
    html += `</tbody></table>`;
  }

  document.getElementById('sales-content').innerHTML = html;
}

let pendingFiles = [];

function handleFileSelect(fileList) {
  for (const f of fileList) pendingFiles.push(f);
  renderFilePreviews();
}

function renderFilePreviews() {
  const el = document.getElementById('rm-file-preview');
  el.innerHTML = pendingFiles.map((f, i) => {
    const isImg = f.type.startsWith('image/');
    const thumb = isImg ? URL.createObjectURL(f) : '';
    return `<div class="file-preview-item">
      ${isImg ? `<img src="${thumb}">` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--bg);font-size:20px">${f.type.startsWith('video/') ? '🎬' : '📄'}</div>`}
      <div class="fp-name">${esc(f.name)}</div>
      <button class="fp-remove" onclick="event.stopPropagation();removePendingFile(${i})">×</button>
    </div>`;
  }).join('');
}

function removePendingFile(idx) { pendingFiles.splice(idx, 1); renderFilePreviews(); }

// Drag & drop
const dropZone = document.getElementById('rm-file-drop');
if (dropZone) {
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFileSelect(e.dataTransfer.files); });
}

async function submitRoadmapItem() {
  const title = document.getElementById('rm-title').value.trim();
  if (!title) { alert('Title is required'); return; }

  const fd = new FormData();
  fd.append('title', title);
  fd.append('description', document.getElementById('rm-desc').value.trim());
  fd.append('priority', document.getElementById('rm-priority').value);
  fd.append('category', document.getElementById('rm-category').value);
  const targetDate = document.getElementById('rm-target').value;
  if (targetDate) fd.append('target_date', String(Math.floor(new Date(targetDate).getTime() / 1000)));
  fd.append('status', 'planned');
  fd.append('created_by', 'dashboard');
  for (const f of pendingFiles) fd.append('files', f);

  const res = await fetch(API + '/api/roadmap', { method: 'POST', body: fd });
  if (res.ok) {
    document.getElementById('rm-title').value = '';
    document.getElementById('rm-desc').value = '';
    document.getElementById('rm-priority').value = 'medium';
    document.getElementById('rm-category').value = '';
    document.getElementById('rm-target').value = '';
    pendingFiles = [];
    renderFilePreviews();
    loadRoadmap();
  } else {
    alert('Failed to add item');
  }
}

async function loadRoadmap() {
  const status = document.getElementById('rm-filter-status')?.value || 'all';
  const res = await fetch(API + `/api/roadmap?status=${status}`);
  const items = await res.json();

  if (status !== 'all') {
    // Flat list when filtering
    document.getElementById('roadmap-board').innerHTML = items.length
      ? `<div style="width:100%">${items.map(renderRoadmapCard).join('')}</div>`
      : '<div class="empty">No items found</div>';
    return;
  }

  // Kanban columns
  const planned = items.filter(i => i.status === 'planned');
  const inProgress = items.filter(i => i.status === 'in_progress');
  const done = items.filter(i => i.status === 'done');

  document.getElementById('roadmap-board').innerHTML = `
    <div class="roadmap-col">
      <div class="roadmap-col-header planned">📋 Planned (${planned.length})</div>
      ${planned.map(renderRoadmapCard).join('') || '<div class="empty" style="padding:20px">No planned items</div>'}
    </div>
    <div class="roadmap-col">
      <div class="roadmap-col-header in_progress">🔨 In Progress (${inProgress.length})</div>
      ${inProgress.map(renderRoadmapCard).join('') || '<div class="empty" style="padding:20px">Nothing in progress</div>'}
    </div>
    <div class="roadmap-col">
      <div class="roadmap-col-header done">✅ Done (${done.length})</div>
      ${done.map(renderRoadmapCard).join('') || '<div class="empty" style="padding:20px">Nothing completed yet</div>'}
    </div>
  `;
}

function renderRoadmapCard(item) {
  const targetStr = item.target_date ? `<span style="font-size:11px;color:var(--muted)">📅 ${new Date(item.target_date * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>` : '';
  const catBadge = item.category ? `<span class="badge medium" style="font-size:10px">${esc(item.category)}</span>` : '';
  const prioBadge = `<span class="badge ${item.priority}">${item.priority}</span>`;

  let attachHtml = '';
  if (item.attachments && item.attachments.length > 0) {
    attachHtml = '<div class="rm-attachments">' + item.attachments.map(a => {
      if (a.mime_type.startsWith('image/')) {
        return `<img class="rm-thumb" src="${a.url}" alt="${esc(a.original_name)}" onclick="event.stopPropagation();openLightbox('${a.url}','image')" title="${esc(a.original_name)}">`;
      } else if (a.mime_type.startsWith('video/')) {
        return `<div class="rm-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:22px;cursor:pointer" onclick="event.stopPropagation();openLightbox('${a.url}','video')" title="${esc(a.original_name)}">🎬</div>`;
      } else {
        return `<a class="rm-file" href="${a.url}" target="_blank" onclick="event.stopPropagation()">📎 ${esc(a.original_name)}</a>`;
      }
    }).join('') + '</div>';
  }

  return `<div class="roadmap-card">
    <h4>${esc(item.title)}</h4>
    ${item.description ? `<p>${esc(item.description)}</p>` : ''}
    <div class="rm-meta">${prioBadge} ${catBadge} ${targetStr}</div>
    ${attachHtml}
    <div class="rm-actions">
      <select onchange="updateRoadmapStatus(${item.id}, this.value)">
        <option value="planned" ${item.status==='planned'?'selected':''}>Planned</option>
        <option value="in_progress" ${item.status==='in_progress'?'selected':''}>In Progress</option>
        <option value="done" ${item.status==='done'?'selected':''}>Done</option>
      </select>
      <button onclick="uploadMoreFiles(${item.id})">+ Files</button>
      <button onclick="deleteRoadmapItem(${item.id})" style="color:var(--red)">Delete</button>
    </div>
  </div>`;
}

async function updateRoadmapStatus(id, status) {
  await fetch(API + `/api/roadmap/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
  loadRoadmap();
}

async function deleteRoadmapItem(id) {
  if (!confirm('Delete this roadmap item?')) return;
  await fetch(API + `/api/roadmap/${id}`, { method: 'DELETE' });
  loadRoadmap();
}

function uploadMoreFiles(itemId) {
  const input = document.createElement('input');
  input.type = 'file'; input.multiple = true; input.accept = 'image/*,video/*,.pdf';
  input.onchange = async () => {
    const fd = new FormData();
    for (const f of input.files) fd.append('files', f);
    await fetch(API + `/api/roadmap/${itemId}/attachments`, { method: 'POST', body: fd });
    loadRoadmap();
  };
  input.click();
}

function openLightbox(url, type) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const vid = document.getElementById('lightbox-video');
  if (type === 'image') { img.src = url; img.style.display = 'block'; vid.style.display = 'none'; vid.pause(); }
  else { vid.src = url; vid.style.display = 'block'; img.style.display = 'none'; }
  lb.classList.add('active');
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('active');
  document.getElementById('lightbox-video').pause();
}

const STAGE_COLORS = {
  lead:        { bg: 'rgba(59,130,246,0.10)',  border: 'var(--blue)',   text: 'var(--blue)',   label: 'Lead' },
  qualified:   { bg: 'rgba(168,85,247,0.10)',  border: '#a855f7',       text: '#a855f7',       label: 'Qualified' },
  meeting:     { bg: 'rgba(234,179,8,0.10)',   border: 'var(--yellow)', text: 'var(--yellow)', label: 'Meeting' },
  proposal:    { bg: 'rgba(249,115,22,0.10)',  border: 'var(--orange)', text: 'var(--orange)', label: 'Proposal' },
  negotiation: { bg: 'rgba(239,68,68,0.10)',   border: 'var(--red)',    text: 'var(--red)',    label: 'Negotiation' },
};

async function loadPipeline() {
  const owner = document.getElementById('pipeline-owner')?.value || 'all';
  const res = await fetch(API + `/api/pipeline?owner=${owner}`);
  const data = await res.json();

  // Top summary band
  const s = data.summary;
  document.getElementById('pipeline-summary').innerHTML = `
    <div class="stats" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));margin-bottom:0">
      <div class="stat-card open"><div class="number">${s.open_value}</div><div class="label">Open BHD</div></div>
      <div class="stat-card team"><div class="number">${s.weighted}</div><div class="label">Weighted BHD</div></div>
      <div class="stat-card"><div class="number">${s.total}</div><div class="label">Deals</div></div>
      <div class="stat-card closed"><div class="number">${s.win_rate_pct}%</div><div class="label">Win rate (90d)</div></div>
      <div class="stat-card reminders"><div class="number">${s.avg_deal}</div><div class="label">Avg BHD</div></div>
      <div class="stat-card urgent"><div class="number">${s.avg_cycle ?? 0}d</div><div class="label">Avg cycle</div></div>
    </div>
    ${s.top_lost ? `<div style="margin-top:8px;font-size:12px;color:var(--muted)">Top lost reason: <strong>${esc(s.top_lost)}</strong></div>` : ''}
  `;

  // Kanban columns
  const board = document.getElementById('pipeline-board');
  board.innerHTML = data.stages.map(stage => {
    const info = STAGE_COLORS[stage] || { bg: 'var(--card)', border: 'var(--border)', text: 'var(--muted)', label: stage };
    const deals = data.deals.filter(d => d.stage === stage);
    const totalValue = deals.reduce((sum, d) => sum + (d.value_bhd || d.valueBhd || 0), 0);
    return `
      <div style="flex:1;min-width:240px;background:${info.bg};border:1px solid ${info.border};border-radius:10px;padding:10px">
        <div style="font-size:12px;color:${info.text};text-transform:uppercase;font-weight:600;margin-bottom:8px;display:flex;justify-content:space-between">
          <span>${info.label} · ${deals.length}</span>
          <span>${Math.round(totalValue)} BHD</span>
        </div>
        ${deals.map(d => {
          const value = Math.round(d.value_bhd || d.valueBhd || 0);
          const client = d.client_name || d.clientName || '—';
          const owner = d.owner || '?';
          return `<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px">
            <div style="font-weight:600;font-size:13px;margin-bottom:4px">#${d.id} ${esc(d.title)}</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">${esc(client)} · ${esc(owner)}</div>
            <div style="font-size:13px;color:${info.text};font-weight:600">${value} BHD</div>
            <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">
              <button onclick="moveDealUI(${d.id}, 'next', '${stage}')" style="padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:11px;cursor:pointer">→ Advance</button>
              <button onclick="winDealUI(${d.id})" style="padding:3px 8px;border-radius:4px;border:1px solid var(--green);background:rgba(34,197,94,0.1);color:var(--green);font-size:11px;cursor:pointer">Won</button>
              <button onclick="loseDealUI(${d.id})" style="padding:3px 8px;border-radius:4px;border:1px solid var(--red);background:rgba(239,68,68,0.1);color:var(--red);font-size:11px;cursor:pointer">Lost</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }).join('');
}

const STAGE_NEXT = { lead: 'qualified', qualified: 'meeting', meeting: 'proposal', proposal: 'negotiation', negotiation: 'won' };

async function moveDealUI(id, dir, currentStage) {
  const next = STAGE_NEXT[currentStage] || 'won';
  await fetch(API + `/api/deals/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stage: next }),
  });
  loadPipeline();
}

async function winDealUI(id) {
  const v = prompt('Final value in BHD?');
  if (v === null) return;
  await fetch(API + `/api/deals/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stage: 'won', value_bhd: parseFloat(v) || 0 }),
  });
  loadPipeline();
}

async function loseDealUI(id) {
  const r = prompt('Lost reason?');
  if (!r) return;
  await fetch(API + `/api/deals/${id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stage: 'lost', lost_reason: r }),
  });
  loadPipeline();
}

// ── Meetings ────────────────────────────────
async function loadMeetings() {
  const outcome = document.getElementById('meetings-outcome')?.value || 'all';
  const owner = document.getElementById('meetings-owner')?.value || 'all';
  const res = await fetch(API + `/api/meetings?outcome=${outcome}&owner=${owner}`);
  const meetings = await res.json();
  if (!meetings.length) {
    document.getElementById('meetings-table').innerHTML = '<div class="empty">No meetings logged.<br><br>Ask the bot in Discord: <strong>"I met with [client] today"</strong></div>';
    return;
  }
  const outcomeBadge = (o) => {
    const map = { pending: { cls: 'open', label: '⏳ Pending' }, closed: { cls: 'closed', label: '✅ Closed' },
                  follow_up: { cls: 'in_progress', label: '📞 Follow-up' }, lost: { cls: 'urgent', label: '❌ Lost' },
                  rescheduled: { cls: 'pending', label: '🔄 Rescheduled' } };
    const m = map[o] || { cls: 'low', label: o };
    return `<span class="badge ${m.cls}">${m.label}</span>`;
  };
  document.getElementById('meetings-table').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Client</th><th>Title</th><th>Owner</th><th>Date</th><th>Outcome</th><th>Follow-up</th><th>Value</th></tr></thead>
      <tbody>${meetings.map(m => `
        <tr>
          <td>${m.id}</td>
          <td>${esc(m.clientName || '—')}</td>
          <td>${esc(m.title)}</td>
          <td>${esc(m.owner || '?')}</td>
          <td>${fmtDate(m.scheduledAt)}</td>
          <td>${outcomeBadge(m.outcome)}</td>
          <td>${m.followUpAt ? fmtDate(m.followUpAt) : '—'}</td>
          <td>${m.valueBhd ? Math.round(m.valueBhd) + ' BHD' : '—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

// ── Fulfillment ─────────────────────────────
async function loadFulfillment() {
  const owner = document.getElementById('fulfillment-owner')?.value || 'all';
  const res = await fetch(API + `/api/fulfillment?owner=${owner}`);
  const projects = await res.json();
  if (!projects.length) {
    document.getElementById('fulfillment-grid').innerHTML = '<div class="empty">No active fulfillment projects.<br><br>When a deal is won, the bot creates a fulfillment project automatically.</div>';
    return;
  }
  const nowSec = Math.floor(Date.now() / 1000);
  document.getElementById('fulfillment-grid').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-top:12px">
      ${projects.map(p => {
        const daysLeft = Math.floor((p.target_delivery - nowSec) / 86400);
        const flag = daysLeft < 0 ? `<span class="badge urgent">🔴 ${Math.abs(daysLeft)}d OVERDUE</span>` :
                     daysLeft <= 3 ? `<span class="badge open">⚡ ${daysLeft}d left</span>` :
                     `<span class="badge medium">${daysLeft}d left</span>`;
        const statusBadge = p.status === 'at_risk' ? '<span class="badge urgent">⚠️ At Risk</span>' :
                            p.status === 'done' ? '<span class="badge closed">✅ Done</span>' :
                            '<span class="badge closed">🟢 Active</span>';
        const typeBadge = `<span class="badge ${p.project_type === 'lamma' ? 'medium' : 'low'}">${p.project_type}</span>`;
        const planeBtn = p.plane_project_id
          ? `<a href="http://194.163.157.202:8888/lamma/projects/${p.plane_project_id}/issues" target="_blank" style="padding:4px 10px;border-radius:4px;border:1px solid var(--accent);background:rgba(99,102,241,0.1);color:var(--accent);font-size:11px;text-decoration:none">📋 Open in Plane</a>`
          : '<span style="font-size:11px;color:var(--muted)">Plane sync pending</span>';
        return `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <div>
              <div style="font-weight:600;font-size:14px">#${p.id} ${esc(p.project_name)}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">Owner: ${esc(p.owner || '?')} · ${typeBadge}</div>
            </div>
            ${statusBadge}
          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px">
            Phase: <strong style="color:var(--text)">${esc(p.current_phase)}</strong> · ${flag}
          </div>
          <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin-bottom:6px">
            <div style="background:var(--accent);height:100%;width:${p.progress_pct}%;transition:width 0.3s"></div>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:10px">
            ${p.milestones_done}/${p.milestones_count} milestones done · ${p.progress_pct}%
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button onclick="showFulfillmentDetail(${p.id})" style="padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:11px;cursor:pointer">View milestones</button>
            <button onclick="checkInFulfillment(${p.id})" style="padding:4px 10px;border-radius:4px;border:1px solid var(--green);background:rgba(34,197,94,0.1);color:var(--green);font-size:11px;cursor:pointer">✓ Checked in today</button>
            ${planeBtn}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

async function showFulfillmentDetail(id) {
  const res = await fetch(API + `/api/fulfillment/${id}`);
  const data = await res.json();
  if (!data.project) return;
  const lines = data.milestones.map(m => {
    const flag = m.completed_at ? '✅' : m.status === 'overdue' ? '🔴' : '⏳';
    const date = new Date(m.target_date * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const btn = m.completed_at ? '' :
      `<button onclick="completeMilestoneUI(${m.id}, ${id})" style="margin-left:8px;padding:2px 8px;border-radius:4px;border:1px solid var(--green);background:rgba(34,197,94,0.1);color:var(--green);font-size:11px;cursor:pointer">Done</button>`;
    return `${flag} ${m.title} — ${date} <small style="color:var(--muted)">(${m.phase})</small>${btn}`;
  });
  alert(`${data.project.projectName}\n\n` + data.milestones.map(m => {
    const flag = m.completed_at ? '✅' : m.status === 'overdue' ? '🔴' : '⏳';
    const date = new Date(m.target_date * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `${flag} ${m.title} — ${date} (${m.phase})`;
  }).join('\n'));
}

async function completeMilestoneUI(milestoneId, fId) {
  await fetch(API + `/api/milestones/${milestoneId}/complete`, { method: 'PUT' });
  loadFulfillment();
}

async function checkInFulfillment(id) {
  await fetch(API + `/api/fulfillment/${id}/check-in`, { method: 'POST' });
  loadFulfillment();
}

// Auto-refresh every 30s
setInterval(loadAll, 30000);

// Check if already logged in
checkAuth();
</script>
